<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Noticias</title>

    <!-- Link Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">

    <!-- Icones Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg px-5" style="background-color: #0b0f19;">

        <!-- Lista de assuntos -->
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-3 me-2">

        <!-- botão para abrir form de pesquisa -->
        <button class="btn btn-outline-light rounded-5 ms-2" id="btn-nav-open-search" type="button"><i class="bi bi-search"></i></button>

        <!-- botão para abrir offcanvas se for mobile -->
