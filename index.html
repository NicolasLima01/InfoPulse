<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Noticias</title>

    <!-- Link CSS Padrão -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Link Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">

    <!-- Icones Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <!-- header -->
    <nav class="navbar navbar-expand-lg px-5" style="background-color: #0b0f19;">

        <!-- Lista de assuntos -->
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-3 me-2">
                <li class="nav-item"><a href="#" class="nav-link text-white fw-bolder">Hardware</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-white fw-bolder">Startups</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-white fw-bolder">IA</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-white fw-bolder">Segurança</a></li>
            </ul>
        </div>

        <!-- botão para submeter form de pesquisa -->
        <button class="btn btn-outline-light rounded-5 ms-2" id="btn-nav-submit-search" type="submit" hidden><i
                class="bi bi-box-arrow-in-right"></i></button>

        <!-- form para pesquisar por matérias ou temas-->
        <input class="form-control ms-2 w-25 border border-0" id="form-nav-search" type="text" placeholder="Pesquisar"
            hidden>

        <!-- botão para abrir form de pesquisa -->
        <button class="btn btn-outline-light rounded-5 ms-2" id="btn-nav-open-search" type="button"><i
                class="bi bi-search"></i></button>

        <!-- botão para abrir offcanvas se for mobile -->
        <button class="btn btn-outline-light rounded-5 ms-2" type="submit"><i class="bi bi-list"></i></button>

    </nav>

    <!-- container principal -->
    <main id="hero" class="container-fluid">

        <!-- logo -->
        <h1 class="h-auto display-3 fw-bold text-center pt-4 pb-3">LOGO</h1>

        <!-- container com 75% de altura que abriga colunas com as principais noticias -->
        <div class="container h-75 w-100 d-flex">

            <!-- container com altura de 100% e largura de 75% -->
            <div class="container h-100 w-75 p-0">

                <!-- linha do grid com altura 100% e gap horizontal de 5 -->
                <div class="row h-100 w-100">

                    <!-- coluna com largura de 8 colunas do grid -->
                    <div class="col col-8 border coluna-noticia-principal">

                    </div>

                    <!-- coluna com largura de 8 colunas do grid -->
                    <div class="col col-4 my-0 pe-0">

                        <!-- linha do grid com altura 50% -->
                        <div class="row mx-1 coluna-noticia border mb-4">
                        </div>

                        <!-- linha do grid com altura 50% -->
                        <div class="row mx-1 coluna-noticia border">
                        </div>

                    </div>

                </div>

            </div>

            <!-- container com altura de 100% e largura de 25% -->
            <div class="container h-100 w-25 border p-0">

                <h2 class="h-auto pb-5 ps-3">Principais Notícias</h1>

                <ul class="list-group list-group-flush px-1">
                    <a href="#" class="list-group-item list-group-item-action bg-transparent pb-5 mb-4">The current link item</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent pb-5 mb-4">A second link item</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent pb-5 mb-4">A third link item</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent pb-5 mb-4">A fourth link item</a>
                    <a href="#" class="list-group-item list-group-item-action bg-transparent pb-5 mb-4">A fourth link item</a>

                </ul>
            </div>

        </div>

    </main>



    <!-- Link Bootstrap JavaScript -->
    <script src="js/bootstrap.min.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
